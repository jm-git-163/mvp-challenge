<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150A28"/>
      <stop offset="100%" stop-color="#050509"/>
    </linearGradient>
    <radialGradient id="glowPink" cx="14%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#FF3D7F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF3D7F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="88%" cy="22%" r="42%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLime" cx="78%" cy="95%" r="55%">
      <stop offset="0%" stop-color="#C6FF00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C6FF00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="28%" cy="88%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FF3D7F"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF3D7F"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowPink)"/>
  <rect width="1200" height="630" fill="url(#glowCyan)"/>
  <rect width="1200" height="630" fill="url(#glowLime)"/>
  <rect width="1200" height="630" fill="url(#glowViolet)"/>

  <!-- Floating emoji badges -->
  <g opacity="0.95">
    <circle cx="180" cy="140" r="48" fill="#FF3D7F" filter="url(#soft)" opacity="0.35"/>
    <text x="180" y="162" font-size="60" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">💪</text>

    <circle cx="1040" cy="170" r="52" fill="#00E5FF" filter="url(#soft)" opacity="0.30"/>
    <text x="1040" y="196" font-size="72" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🎤</text>

    <circle cx="120" cy="500" r="42" fill="#C6FF00" filter="url(#soft)" opacity="0.30"/>
    <text x="120" y="520" font-size="54" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🔥</text>

    <circle cx="1080" cy="470" r="46" fill="#8B5CF6" filter="url(#soft)" opacity="0.40"/>
    <text x="1080" y="494" font-size="60" text-anchor="middle" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">✨</text>
  </g>

  <!-- Glass card -->
  <g>
    <rect x="120" y="120" width="960" height="390" rx="40" ry="40"
          fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1.5"/>

    <!-- Label chip -->
    <g transform="translate(170,170)">
      <rect width="240" height="46" rx="23" ry="23" fill="url(#chip)"/>
      <text x="120" y="31" font-size="20" font-weight="700" text-anchor="middle"
            fill="#FFFFFF" font-family="Pretendard,Inter,Apple SD Gothic Neo,Noto Sans KR,sans-serif"
            letter-spacing="0.04em">
        AI 챌린지 · 숏폼
      </text>
    </g>

    <!-- Main title -->
    <text x="170" y="310" font-size="88" font-weight="900"
          fill="url(#title)"
          font-family="Pretendard,Inter,Apple SD Gothic Neo,Noto Sans KR,sans-serif"
          letter-spacing="-0.03em">
      챌린지 스튜디오
    </text>

    <!-- Subtitle -->
    <text x="170" y="375" font-size="30" font-weight="600"
          fill="#FFFFFF" fill-opacity="0.92"
          font-family="Pretendard,Inter,Apple SD Gothic Neo,Noto Sans KR,sans-serif"
          letter-spacing="-0.01em">
      포즈·음성·표정 AI 인식 + 실시간 합성
    </text>
    <text x="170" y="415" font-size="26" font-weight="500"
          fill="#FFFFFF" fill-opacity="0.72"
          font-family="Pretendard,Inter,Apple SD Gothic Neo,Noto Sans KR,sans-serif"
          letter-spacing="-0.01em">
      스쿼트 · K-POP · 뉴스 · 브이로그 — 눌러서 시작
    </text>

    <!-- CTA button -->
    <g transform="translate(170,450)">
      <rect width="240" height="62" rx="31" ry="31" fill="#FFE066"/>
      <text x="120" y="42" font-size="26" font-weight="800" text-anchor="middle"
            fill="#0F0A1F" font-family="Pretendard,Inter,Apple SD Gothic Neo,Noto Sans KR,sans-serif"
            letter-spacing="-0.02em">
        ▶ 바로 도전하기
      </text>
    </g>

    <!-- Right-side trophy -->
    <g transform="translate(870,230)">
      <circle cx="80" cy="80" r="100" fill="#FF3D7F" opacity="0.18" filter="url(#soft)"/>
      <text x="80" y="130" font-size="150" text-anchor="middle"
            font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji">🏆</text>
    </g>
  </g>

  <!-- Footer brand -->
  <text x="600" y="580" font-size="22" font-weight="500" text-anchor="middle"
        fill="#FFFFFF" fill-opacity="0.55"
        font-family="Pretendard,Inter,Apple SD Gothic Neo,Noto Sans KR,sans-serif"
        letter-spacing="0.08em">
    MotiQ · mvp-ivory-kappa.vercel.app
  </text>
</svg>
